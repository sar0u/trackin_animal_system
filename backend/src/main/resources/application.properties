spring.application.name=backend

# 1. Connexion à la base de données
# Assure-toi que la base 'AnimalTrackingSystem' existe déjà dans MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/dz_cheptel_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate & JPA
# CHANGEMENT : On passe de 'none' à 'update' pour que Hibernate crée/modifie les tables automatiquement
spring.jpa.hibernate.ddl-auto=update

# Affichage des requêtes SQL dans la console (très utile pour débugger)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Stratégie de nommage (Standard respecte exactement les noms de tes @Column)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.jpa.open-in-view=false