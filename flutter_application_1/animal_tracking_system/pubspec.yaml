name: tracedz
description: TraceDZ - National Animal Traceability System
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  qr_code_scanner: ^1.0.1
  flutter_svg: ^2.0.10+1
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ✅ ICI: flutter_launcher_icons DOIT ETRE ICI, PAS DANS FLUTTER
  flutter_launcher_icons: ^0.13.1


# ✅ ICI: Configuration icone application A LA RACINE, PAS DANS FLUTTER
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-paw-512.png"
  adaptive_icon_background: "#E8F5E9"


flutter:
  uses-material-design: true

  # ✅ SEULS LES ASSETS VONT ICI
  assets:
    - assets/images/icon-paw-512.png
    - assets/icons/paw_logo.svg