name: dzcheptel
description: Système de traçabilité animale DZcheptel

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Stockage local
  shared_preferences: ^2.2.2

  # Scanner QR/Barcode
  mobile_scanner: ^5.1.1

  # NFC
  nfc_manager: ^3.3.0

  # Base de données locale
  sqflite: ^2.3.2
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Connectivité
  connectivity_plus: ^5.0.2

  # Sécurité
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.67.0

  # Dates
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png